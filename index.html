function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function s(text){var cls=Array.prototype.slice.call(arguments,1);var e=esc(text);return cls.length?'<span class="'+cls.join(' ')+'">'+e+'</span>':e}
function sw(html){var cls=Array.prototype.slice.call(arguments,1);return cls.length?'<span class="'+cls.join(' ')+'">'+html+'</span>':html}
function center(str,w){var p=w-str.length;if(p<=0)return str;var l=Math.floor(p/2);return ' '.repeat(l)+str+' '.repeat(p-l)}
function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function choice(a){return a[Math.floor(Math.random()*a.length)]}
function sample(arr,k){var c=arr.slice();var r=[];for(var i=0;i<k&&c.length;i++){var j=Math.floor(Math.random()*c.length);r.push(c.splice(j,1)[0])}return r}
function sleep(ms){return new Promise(function(r){setTimeout(r,ms)})}

var outEl=document.getElementById('out');

var cmdEl=document.getElementById('cmd');
var inputResolve=null;

function print(html){outEl.innerHTML+=html+'\n';outEl.scrollTop=outEl.scrollHeight}
function printMono(html){outEl.innerHTML+='<span class="mono">'+html+'</span>\n';outEl.scrollTop=outEl.scrollHeight}
function clear(){outEl.innerHTML=''}

function waitInput(promptHtml){
  return new Promise(function(resolve){
    ps1El.innerHTML=promptHtml||'';
    cmdEl.value='';
    inLine.style.display='flex';
    cmdEl.focus();
    inputResolve=resolve;
  });
}

cmdEl.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    e.preventDefault();
    if(!inputResolve)return;
    var val=cmdEl.value;
    print(ps1El.innerHTML+esc(val));
    cmdEl.value='';
    inLine.style.display='none';
    var r=inputResolve;
    inputResolve=null;
    r(val);
  }
});

var COLS='ABCDEFGHIJ';

function generateMerchantStock(){
  var stock=[];
  var ck=Object.keys(CONSUMABLES),wk=Object.keys(WEAPONS),ak=Object.keys(ARMORS);
  sample(ck,Math.min(3,ck.length)).forEach(function(k){stock.push(k)});
  sample(wk,randInt(1,3)).forEach(function(k){stock.push(k)});
  if(Math.random()<0.6)stock.push(choice(ak));
  return stock;
}

function generateWorld(){
  var world={};
  var cells=[];
  for(var ci=0;ci<COLS.length;ci++)for(var r=1;r<=10;r++)cells.push(COLS[ci]+r);
  var capitalPos='E5';
  var available=cells.filter(function(c){return c!==capitalPos});
  var counts=[['forest',3],['village',3],['cave',2],['castle',2],['dungeon',2],['dragon_lair',1]];
  var total=0;counts.forEach(function(c){total+=c[1]});
  var chosen=sample(available,total);
  var specialMap={};var idx=0;
  counts.forEach(function(pair){for(var i=0;i<pair[1];i++){specialMap[chosen[idx]]=pair[0];idx++}});
  specialMap[capitalPos]='capital';
  for(var ci=0;ci<COLS.length;ci++){
    for(var r=1;r<=10;r++){
      var pos=COLS[ci]+r;
      var tileType=specialMap[pos]||'plains';
      var tile={type:tileType,visited:false,merchant_stock:null,loot_available:true,enemies_cleared:false,revealed:false};
      if(tileType==='village')tile.merchant_stock=generateMerchantStock();
      if(tileType==='capital'){tile.revealed=true;tile.merchant_stock=generateMerchantStock()}
      world[pos]=tile;
    }
  }
  return world;
}

function drawMap(world,playerPos){
  var colW=4;
  printMono('');
  var hdr='      '+COLS.split('').map(function(c){return s(center(c,colW),'bold','cyan')}).join(' ');
  printMono(hdr);
  printMono(s('     '+'-'.repeat(COLS.length*(colW+1)-1),'dim'));
  for(var r=1;r<=10;r++){
    var label=s(' '+String(r).padStart(2)+' ','bold','cyan')+s('| ','dim');
    var cells=[];
    for(var ci=0;ci<COLS.length;ci++){
      var c=COLS[ci],pos=c+r,tile=world[pos],t=tile.type;
      if(t!=='plains'&&t!=='capital'&&!tile.revealed&&pos!==playerPos){
        cells.push(s(center('.',colW),'dim'));
      }else{
        cells.push(s(center(TILE_SYMBOLS[t],colW),TILE_COLORS[t].join(' ')));
      }
    }
    printMono(label+cells.join(' '));
  }
  printMono('');
  var legend=[];
  ['plains','forest','village','cave','castle','dungeon','capital','dragon_lair'].forEach(function(t){
    legend.push(s(TILE_SYMBOLS[t],TILE_COLORS[t].join(' '))+s('='+TILE_NAMES[t],'dim'));
  });
  printMono('     '+legend.join('  '));
  print('');
}

function findPoi(world,excludePos){
  var pois=[];
  for(var pos in world){if(world[pos].type!=='plains'){if(excludePos&&pos===excludePos)continue;pois.push([pos,world[pos].type])}}
  return pois;
}

// PLAYER
// ===================================================================
function Player(){
  this.hp=100;this.max_hp=100;this.base_attack=3;this.base_armor=0;
  this.gold=20;this.level=1;this.xp=0;this.xp_to_next=50;
  this.weapon='rusty_sword';this.armor_equipped='cloth_rags';
  this.weapons=['rusty_sword'];this.armors=['cloth_rags'];
  this.consumables=['small_potion'];this.misc=[];
  this.pos='E5';this.inside=null;this.subloc=null;
  this.dragon_quest=null;
}
Player.prototype.getAttack=function(){var w=WEAPONS[this.weapon];return this.base_attack+(w?w.attack:0)};
Player.prototype.getArmor=function(){var a=ARMORS[this.armor_equipped];return this.base_armor+(a?a.armor:0)};
Player.prototype.weaponName=function(){var w=WEAPONS[this.weapon];return w?w.name:'Bare Fists'};
Player.prototype.armorName=function(){var a=ARMORS[this.armor_equipped];return a?a.name:'None'};
Player.prototype.heal=function(amt){this.hp=Math.min(this.max_hp,this.hp+amt)};
Player.prototype.takeDamage=function(raw){var r=Math.max(1,raw-Math.floor(this.getArmor()/2));this.hp-=r;return r};
Player.prototype.gainXp=function(amt){
  this.xp+=amt;var leveled=false;
  while(this.xp>=this.xp_to_next){this.xp-=this.xp_to_next;this.level++;this.max_hp+=10;this.hp=this.max_hp;this.base_attack++;this.xp_to_next=Math.floor(this.xp_to_next*1.5);leveled=true}
  return leveled;
};
Player.prototype.hasItem=function(k){return this.weapons.indexOf(k)>=0||this.armors.indexOf(k)>=0||this.consumables.indexOf(k)>=0||this.misc.indexOf(k)>=0};
Player.prototype.addItem=function(k){if(WEAPONS[k])this.weapons.push(k);else if(ARMORS[k])this.armors.push(k);else if(CONSUMABLES[k])this.consumables.push(k);else if(MISC_ITEMS[k])this.misc.push(k)};
Player.prototype.removeItem=function(k){
  var lists=[this.weapons,this.armors,this.consumables,this.misc];
  for(var i=0;i<lists.length;i++){var idx=lists[i].indexOf(k);if(idx>=0){lists[i].splice(idx,1);return true}}return false;
};

function Game(){
  this.world=generateWorld();

  this.running=true;

  for(var pos in this.world){if(this.world[pos].type==='dragon_lair'){this.dragonLairPos=pos;break}}
}

Game.prototype.tile=function(){return this.world[this.player.pos]};
Game.prototype.printSep=function(){print(s('='.repeat(60),'dim'))};
Game.prototype.wrapPrint=function(html){
  var cls=Array.prototype.slice.call(arguments,1);
  print(sw('  '+html,cls.join(' ')));
};
Game.prototype.locLabel=function(){
  var p=this.player,parts=[p.pos];
  if(p.inside)parts.push(p.inside);if(p.subloc)parts.push(p.subloc);
  return parts.join(' > ');
};
Game.prototype.pickPoi=function(){
  var pois=findPoi(this.world,this.player.pos).filter(function(p){return p[1]!=='dragon_lair'});
  if(!pois.length)return[null,null,null];
  var pick=choice(pois);return[pick[0],pick[0],pick[1]];
};

// ---- TALK ----
Game.prototype.cmdTalk=function(){
  var p=this.player,subloc=p.subloc,self=this;
  // King
  if(p.inside==='capital'&&p.subloc==='throne_room'){
    print('');this.printSep();
    print(s('  [The King]','bold','yellow'));print('');
    if(p.level<5){
      this.wrapPrint(esc('"You are brave to seek audience, but you are not yet ready. Return when you have proven yourself worthy. (Reach level 5)"'),'white');
    }else if(p.dragon_quest===null){
      var dl=this.dragonLairPos||'unknown';
      this.wrapPrint('"The realm is dying. An ancient dragon has awakened and terrorises the land from its lair at '+s(dl,'bold','cyan')+'. You must go there and slay the beast. The fate of the kingdom rests upon your shoulders."','white');
      p.dragon_quest='given';
      if(this.dragonLairPos){this.world[this.dragonLairPos].revealed=true;print(s('  [A new location has been revealed on your map!]','bold','cyan'))}
    }else if(p.dragon_quest==='given'){
      var dl=this.dragonLairPos||'unknown';
      this.wrapPrint('"The dragon still lives! Go to '+s(dl,'bold','cyan')+' and slay the beast!"','white');
    }else if(p.dragon_quest==='completed'){
      this.wrapPrint(esc('"You have saved the kingdom! You shall be remembered as a legend!"'),'white');
    }
    this.printSep();print('');return;
  }
  if(!subloc){
    print(s(p.inside?'  There is no one to talk to here. Try entering a specific place.':'  There is no one to talk to in the open.','dim'));
    return;
  }
  var allNpcs={};
  Object.assign(allNpcs,NPC_DIALOGUES[subloc]||{},NPC_DIALOGUES_WILD[subloc]||{});
  if(!Object.keys(allNpcs).length){print(s('  There is no one here willing to speak.','dim'));return}
  var npcName=choice(Object.keys(allNpcs));
  var template=choice(allNpcs[npcName]);
  var poiData=this.pickPoi();
  var line;
  if(poiData[1]&&poiData[2]){
    line=esc(template).replace(/\{coord\}/g,s(poiData[1],'bold','cyan')).replace(/\{loc_type\}/g,s(poiData[2],'bold','yellow'));
  }else{
    line=esc(template.replace(/{coord}/g,'the far reaches').replace(/{loc_type}/g,'dark place'));
  }
  var npcDisplay=npcName.replace(/_/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase()});
  print('');this.printSep();
  print(s('  ['+npcDisplay+']','bold','yellow'));print('');
  this.wrapPrint(line,'white');
  if(poiData[0]){this.world[poiData[0]].revealed=true;print(s('  [A new location has been revealed on your map!]','bold','cyan'))}
  this.printSep();print('');
};

// ---- CD ----
Game.prototype.cmdCd=function(args){
  if(!args.length){print(s('  Usage: cd {cell|location|subloc|..}','red'));return}
  var target=args[0].toLowerCase(),p=this.player;
  if(target==='..'){
    if(p.subloc){p.subloc=null;print(s('  You return to the '+p.inside+'.','yellow'));this.cmdLook()}
    else if(p.inside){p.inside=null;print(s('  You step outside at '+p.pos+'.','yellow'))}
    else print(s('  You are already on the world map.','dim'));
    return;
  }
  if(p.inside){
    var subs=SUBLOCS[p.inside]||[];
    if(subs.indexOf(target)>=0){
      p.subloc=target;this.cmdLook();
      if(target==='merchant'&&(this.tile().type==='village'||this.tile().type==='capital'))this.showMerchant();
      return;
    }
    if(target===p.inside){p.subloc=null;this.cmdLook();return}
  }
  var tile=this.tile();
  if(target===tile.type&&target!=='plains'&&!p.inside){
    p.inside=target;p.subloc=null;tile.visited=true;this.cmdLook();return;
  }
  var cell=args[0].toUpperCase();
  if(cell.length>=2){
    var col=cell[0],row=parseInt(cell.substring(1));
    if(isNaN(row)){print(s('  Unknown destination: '+esc(args[0]),'red'));return}
    if(COLS.indexOf(col)>=0&&row>=1&&row<=10){
      p.inside=null;p.subloc=null;p.pos=col+row;
      var nt=this.tile();nt.visited=true;
      print('');print(s('  You travel to '+p.pos+'...','yellow'));
      this.describeArrival(nt);return;
    }else{print(s('  Invalid cell: '+esc(cell)+'. Use A-J and 1-10.','red'));return}
  }
  print(s('  Unknown destination: '+esc(args[0]),'red'));
};
Game.prototype.describeArrival=function(tile){
  var t=tile.type;
  if(t==='plains'){this.wrapPrint(esc(choice(DESC_PLAINS)),'dim')}
  else{
    this.wrapPrint(esc(choice(DESC_MAP[t]||DESC_PLAINS)),'white');
    print(s('\n  There is a '+t+" here. Use 'cd "+t+"' to enter.",'yellow'));
  }
  print('');
};

// ---- USE ----
Game.prototype.cmdUse=function(args){
  if(!args.length){print(s('  Usage: use {item_name}','red'));return}
  var key=args.join('_').toLowerCase(),p=this.player;
  if(CONSUMABLES[key]&&p.consumables.indexOf(key)>=0){

    print(s('  Used '+info.name+'. Restored '+healed+' HP. (HP: '+p.hp+'/'+p.max_hp+')','green'));

// ---- MERCHANT ----
Game.prototype.showMerchant=function(){
  var stock=this.tile().merchant_stock||[];
  if(!stock.length){print(s('  The merchant has nothing left to sell.','dim'));return}
  print('');print(s("  MERCHANT'S WARES",'bold','yellow'));print(s('  ----------------','dim'));
  stock.forEach(function(key){
    var info=ALL_ITEMS[key]||{};var name=info.name||key;var val=info.value||0;var extra='';
    if(info.attack!==undefined)extra=' (ATK +'+info.attack+')';
    else if(info.armor!==undefined)extra=' (ARM +'+info.armor+')';
    else if(info.heal!==undefined)extra=' (Heal '+info.heal+')';
    print('    '+esc(name+extra)+'  --  '+s(val+' gold','yellow'));
  });
  print('');print(s("  Use 'buy {item}' to purchase, 'sell {item}' to sell.",'dim'));print('');
};

// ---- BUY ----
Game.prototype.cmdBuy=function(args){
  if(!args.length){print(s('  Usage: buy {item_name}','red'));return}
  var p=this.player;
  if(p.subloc!=='merchant'){print(s('  You need to be at a merchant to buy items.','red'));return}
  var key=args.join('_').toLowerCase(),stock=this.tile().merchant_stock||[];
  if(stock.indexOf(key)<0){print(s("  The merchant doesn't have '"+esc(args.join(' '))+"'.",'red'));return}
  var info=ALL_ITEMS[key]||{},cost=info.value||0;
  if(p.gold<cost){print(s('  Not enough gold. You need '+cost+', you have '+p.gold+'.','red'));return}
  p.gold-=cost;p.addItem(key);stock.splice(stock.indexOf(key),1);
  print(s('  Purchased '+info.name+' for '+cost+' gold. (Gold: '+p.gold+')','green'));
};

// ---- SELL ----
Game.prototype.cmdSell=function(args){
  if(!args.length){print(s('  Usage: sell {item_name}','red'));return}
  var p=this.player;
  if(p.subloc!=='merchant'){print(s('  You need to be at a merchant to sell items.','red'));return}
  var key=args.join('_').toLowerCase();
  if(!p.hasItem(key)){print(s("  You don't have '"+esc(args.join(' '))+"'.",'red'));return}
  if(key===p.weapon){print(s('  Unequip your weapon first (equip a different one).','red'));return}
  if(key===p.armor_equipped){print(s('  Unequip your armor first (equip a different one).','red'));return}
  var info=ALL_ITEMS[key]||{},sell=Math.max(1,Math.floor((info.value||1)/2));
  p.removeItem(key);p.gold+=sell;
  print(s('  Sold '+(info.name||key)+' for '+sell+' gold. (Gold: '+p.gold+')','green'));
};

// ---- FIGHT ----
Game.prototype.cmdFight=async function(args){
  var p=this.player,tile=this.tile();
  if((p.inside==='dragon_lair'||tile.type==='dragon_lair')&&p.subloc==='nest'){await this.fightDragon();return}
  var fightable=['dungeon','cave','forest','castle'];
  var loc=p.inside||tile.type;
  if(fightable.indexOf(loc)<0){print(s('  There is nothing to fight here.','dim'));return}
  if(tile.enemies_cleared){print(s('  This area has been cleared of enemies. (For now...)','dim'));return}
  var tmpl=choice(ENEMIES),scale=1+(p.level-1)*0.15;
  var enemy={name:tmpl.name,hp:Math.floor(tmpl.hp*scale),max_hp:Math.floor(tmpl.hp*scale),attack:Math.floor(tmpl.attack*scale),gold:tmpl.gold,xp:Math.floor(tmpl.xp*scale)};
  print('');this.printSep();
  print(s('  A '+enemy.name+' emerges from the shadows!','red','bold'));
  print(s('  HP: '+enemy.hp+'  ATK: '+enemy.attack,'red'));
  this.printSep();print('');
  while(enemy.hp>0&&p.hp>0){
    print(s('  Your HP: '+p.hp+'/'+p.max_hp+'  |  '+enemy.name+' HP: '+enemy.hp+'/'+enemy.max_hp,'white'));
    print(s('  [a]ttack  [u]se potion  [f]lee','cyan'));
    var action=(await waitInput(s('  > ','bold'))).trim().toLowerCase();
    if(action==='a'||action==='attack'){
      var dmg=randInt(Math.floor(p.getAttack()/2),p.getAttack());enemy.hp-=dmg;
      print(s('  You strike the '+enemy.name+' for '+dmg+' damage!','yellow'));
      if(enemy.hp<=0)break;
      var raw=randInt(Math.floor(enemy.attack/2),enemy.attack);var taken=p.takeDamage(raw);
      print(s('  The '+enemy.name+' hits you for '+taken+' damage!','red'));
    }else if(action==='u'||action==='use'){
      var potions=[];p.consumables.forEach(function(k){if(CONSUMABLES[k])potions.push([k,CONSUMABLES[k]])});
      if(potions.length){
        potions.sort(function(a,b){return a[1].heal-b[1].heal});
        var pk=potions[0][0],pi=potions[0][1],oh=p.hp;p.heal(pi.heal);
        p.consumables.splice(p.consumables.indexOf(pk),1);
        print(s('  Used '+pi.name+'. Restored '+(p.hp-oh)+' HP.','green'));
      }else print(s('  No potions available!','red'));
      var raw=randInt(Math.floor(enemy.attack/2),enemy.attack);var taken=p.takeDamage(raw);
      print(s('  The '+enemy.name+' hits you for '+taken+' damage!','red'));
    }else if(action==='f'||action==='flee'){
      if(Math.random()<0.5){print(s('  You flee from battle!','yellow'));print('');return}
      else{
        print(s('  You fail to escape!','red'));
        var raw=randInt(Math.floor(enemy.attack/2),enemy.attack);var taken=p.takeDamage(raw);
        print(s('  The '+enemy.name+' hits you for '+taken+' damage!','red'));
      }
    }else print(s('  Invalid action.','dim'));
    print('');
  }
  if(p.hp<=0){
    print('');this.printSep();
    print(s('  YOU HAVE FALLEN.','red','bold'));print(s('  Darkness takes you...','dim'));
    this.printSep();
    p.hp=Math.floor(p.max_hp/2);var gl=Math.floor(p.gold/3);p.gold-=gl;
    p.pos='E5';p.inside=null;p.subloc=null;
    print(s('  You awaken at '+p.pos+', weakened. Lost '+gl+' gold.','yellow'));print('');
  }else{
    var gg=randInt(enemy.gold[0],enemy.gold[1]);p.gold+=gg;
    print('');this.printSep();
    print(s('  The '+enemy.name+' is defeated!','green','bold'));
    print(s('  Gained '+gg+' gold and '+enemy.xp+' XP.','yellow'));
    var leveled=p.gainXp(enemy.xp);
    if(leveled){print(s('  LEVEL UP! You are now level '+p.level+'!','bold','cyan'));print(s('  Max HP: '+p.max_hp+'  Base ATK: '+p.base_attack,'cyan'))}
    if(Math.random()<0.3){
      var lootPool=Object.keys(CONSUMABLES).concat(Object.keys(MISC_ITEMS));
      if(Math.random()<0.15)lootPool=lootPool.concat(Object.keys(WEAPONS),Object.keys(ARMORS));
      var drop=choice(lootPool);p.addItem(drop);
      print(s('  Found: '+ALL_ITEMS[drop].name+'!','green'));
    }
    this.printSep();print('');
    if(Math.random()<0.4)tile.enemies_cleared=true;
  }
};

  }else{
    var gg=randInt(dragon.gold[0],dragon.gold[1]);p.gold+=gg;
    p.dragon_quest='completed';p.weapons.push('dragon_slayer_blade');
    print('');this.printSep();
    print(s('  THE ANCIENT DRAGON IS SLAIN!','green','bold'));
    print(s('  Gained '+gg+' gold and '+dragon.xp+' XP.','yellow'));
    print(s('  You claim the Dragon Slayer Blade from the hoard!','bold','cyan'));
    var leveled=p.gainXp(dragon.xp);
    if(leveled){print(s('  LEVEL UP! You are now level '+p.level+'!','bold','cyan'));print(s('  Max HP: '+p.max_hp+'  Base ATK: '+p.base_attack,'cyan'))}
    this.printSep();print('');
  }
};

// ---- SEARCH ----
Game.prototype.cmdSearch=function(){
  var p=this.player,tile=this.tile();
  if(!p.inside){print(s('  Nothing to search here in the open.','dim'));return}
  if(!tile.loot_available){print(s("  You've already searched this place thoroughly. Nothing remains.",'dim'));return}
  var searchable=['treasure_room','crypt','altar','ruins','clearing','throne_room','great_hall','tower','dungeon_cells','hoard'];
  if(p.subloc&&searchable.indexOf(p.subloc)>=0){
    var fg=randInt(5,30+p.level*5);p.gold+=fg;
    print(s('  You search carefully... Found '+fg+' gold!','yellow'));
    if(Math.random()<0.5){
      var lp=Object.keys(CONSUMABLES).concat(Object.keys(MISC_ITEMS));
      if(Math.random()<0.2)lp=lp.concat(Object.keys(WEAPONS),Object.keys(ARMORS));
      var ik=choice(lp);p.addItem(ik);
      print(s('  Found: '+ALL_ITEMS[ik].name+'!','green'));
    }
    tile.loot_available=false;
  }else print(s('  You look around but find nothing of interest here.','dim'));
};

// ---- QUIT ----
Game.prototype.cmdQuit=function(){
  print('');print(s('  The darkness closes in. Your journey ends here.','dim'));
  print(s('  Farewell, wanderer.','bold'));print('');
  this.running=false;
};

// ---- DISPATCH ----
Game.prototype.dispatch=async function(raw){
  var parts=raw.trim().split(/\s+/);if(!parts.length||!parts[0])return;
  var cmd=parts[0].toLowerCase(),args=parts.slice(1);
  var handlers={
    help:'cmdHelp',map:'cmdMap',look:'cmdLook',talk:'cmdTalk',
    stats:'cmdStats',inventory:'cmdInventory',inv:'cmdInventory',
    cd:'cmdCd',equip:'cmdEquip',use:'cmdUse',
    buy:'cmdBuy',sell:'cmdSell',fight:'cmdFight',
    search:'cmdSearch',quit:'cmdQuit',exit:'cmdQuit'
  };
  var h=handlers[cmd];
  if(h){await this[h](args)}
  else print(s("  Unknown command: "+esc(cmd)+". Type 'help' for commands.",'red'));
};

// ---- MAIN LOOP ----
Game.prototype.run=async function(){
  await showIntro();
  clear();
  var titleArt=[
    " _____ _  _ ___   ___ ___  ___ ___ ___ _____   ___ ___   ___  _    ___",
    "|_   _| || | __| | __/ _ \\| _ \\ __/ __|_   _| | __/ _ \\ / _ \\| |  / __|",
    "  | | | __ | _|  | _| (_) |   / _|\\__ \\ | |   | _| (_) | (_) | |__|\\__ \\",
    "  |_| |_||_|___| |_| \\___/|_|_\\___|___/ |_|   |_| \\___/ \\___/|____|___/"
  ];
  print('');
  titleArt.forEach(function(l){printMono(s(l,'bold','red'))});
  print('');
  print(s('    A Dark Medieval Gothic Exploration','dim'));
  print('');
  print(s('    You awaken in a grey, desolate land. Fog clings to the earth.','white'));
  print(s('    The sky is iron. Somewhere, a bell tolls.','white'));
  print(s("    Type 'help' for commands. Type 'map' to see the world.",'dim'));
  print('');this.printSep();print('');
  while(this.running){
    var loc=this.locLabel();
    var prompt=s('  ['+loc+']','cyan')+s(' > ','bold');
    var raw=await waitInput(prompt);
    await this.dispatch(raw);
    if(this.player.hp<=0){
      this.player.hp=Math.floor(this.player.max_hp/2);
      var gl=Math.floor(this.player.gold/3);this.player.gold-=gl;
      this.player.pos='E5';this.player.inside=null;this.player.subloc=null;
    }
  }
};
